<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&T — Ultra Luxury Animated Favicon</title>
    <link id="dynamic-favicon" rel="icon" type="image/png" href="">
    <style>
        :root {
            --bg: #020510;
            --card-bg: #0b0f1c;
            --text: #e7e9f0;
            --gold: #d4af37;
            --gold2: #f5e6a3;
            --gold3: #c9a84c;
            --border: #2a3050;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background-image:
                radial-gradient(ellipse at 50% 20%, rgba(212,175,55,0.07) 0%, transparent 65%),
                radial-gradient(ellipse at 30% 80%, rgba(201,168,76,0.04) 0%, transparent 65%);
        }
        .container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 28px;
            align-items: center;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,215,0,0.08) inset;
        }
        .favicon-large {
            width: 96px;
            height: 96px;
            border-radius: 18px;
            box-shadow: 0 0 35px rgba(212,175,55,0.45), 0 0 0 1px rgba(212,175,55,0.3);
            margin-bottom: 18px;
            image-rendering: auto;
            background: #020408;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #d4af37, #f9e282, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 0.85rem;
            color: #a1977a;
            letter-spacing: 1px;
        }
        .control-group {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .speed-slider {
            -webkit-appearance: none;
            width: 200px;
            height: 6px;
            background: linear-gradient(to right, #d4af37, #f5e6a3);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }
        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 12px #d4af37;
            border: 2px solid #d4af37;
        }
        .speed-value {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: #d4af37;
            width: 55px;
            text-align: center;
            font-size: 0.9rem;
        }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: #060a18;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #a1977a;
            margin-top: 14px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff, #d4af37);
            box-shadow: 0 0 10px #d4af37;
            animation: pulseGold 1.4s infinite;
        }
        @keyframes pulseGold {
            0%,100%{ box-shadow:0 0 5px #d4af37; }
            50%{ box-shadow:0 0 16px #d4af37, 0 0 26px #d4af37; }
        }
        .footer-note {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            color: #5a6070;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Live favicon preview (scaled up) -->
            <canvas id="favicon-preview" class="favicon-large" width="32" height="32"></canvas>
            <h1>P&amp;T</h1>
            <div class="subtitle">LUXURY ANIMATED FAVICON</div>

            <div class="control-group">
                <span style="font-size:0.8rem; color:#a1977a;">Slower</span>
                <input type="range" id="speed-slider" class="speed-slider" min="80" max="220" value="130" step="10">
                <span style="font-size:0.8rem; color:#a1977a;">Faster</span>
                <span class="speed-value" id="speed-display">130ms</span>
            </div>

            <div class="status-bar">
                <span class="status-dot"></span>
                <span id="status-text">P&amp;T favicon continuously animating ✦</span>
            </div>
        </div>
        <div class="footer-note">
            ✦ Pure text, pure luxury — no globe, no airplane, just the prestige of P&amp;T
        </div>
    </div>

    <script>
        (function() {
            const faviconLink = document.getElementById('dynamic-favicon');
            const FAV = 32;
            let frames = [];
            let frameIdx = 0;
            let intervalId = null;
            let speed = 130; // ms

            // ──────────────────────────────────────
            // ULTRA LUXURY P&T TEXT FAVICON FRAMES
            // ──────────────────────────────────────
            function generateUltraPTFrames(count = 48) {
                const framesArr = [];
                for (let i = 0; i < count; i++) {
                    const t = i / count;
                    // Shine sweep across text (from left to right)
                    const shineX = (t * 45) - 8;
                    // Glow pulse intensity
                    const glowIntensity = 0.6 + 0.4 * Math.sin(t * Math.PI * 3);
                    // Sparkle rotation angles
                    const sparkAngle1 = t * Math.PI * 2;
                    const sparkAngle2 = t * Math.PI * 2 + 1.2;

                    framesArr.push(renderFrame((ctx, s) => {
                        // Background: deep royal dark blue-black with subtle radial glow
                        const bgGrad = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s*0.7);
                        bgGrad.addColorStop(0, '#0d1b33');
                        bgGrad.addColorStop(1, '#020408');
                        ctx.fillStyle = bgGrad;
                        ctx.fillRect(0, 0, s, s);

                        // Ornate golden border (double ring)
                        ctx.strokeStyle = 'rgba(212,175,55,0.35)';
                        ctx.lineWidth = 1.2;
                        ctx.beginPath();
                        ctx.arc(s/2, s/2, s*0.48, 0, Math.PI*2);
                        ctx.stroke();
                        ctx.strokeStyle = 'rgba(255,235,180,0.25)';
                        ctx.lineWidth = 0.7;
                        ctx.beginPath();
                        ctx.arc(s/2, s/2, s*0.43, 0, Math.PI*2);
                        ctx.stroke();

                        // Pulsing soft glow behind text
                        const glowGrad = ctx.createRadialGradient(s/2, s/2, s*0.05, s/2, s/2, s*0.35);
                        glowGrad.addColorStop(0, `rgba(212,175,55,${glowIntensity*0.8})`);
                        glowGrad.addColorStop(1, 'rgba(212,175,55,0)');
                        ctx.fillStyle = glowGrad;
                        ctx.beginPath();
                        ctx.arc(s/2, s/2, s*0.35, 0, Math.PI*2);
                        ctx.fill();

                        // Main text: P&T in serif luxury font, gold gradient with shadow
                        const textGrad = ctx.createLinearGradient(s*0.25, s*0.3, s*0.75, s*0.7);
                        textGrad.addColorStop(0, '#d4af37');
                        textGrad.addColorStop(0.3, '#fef0c8');
                        textGrad.addColorStop(0.7, '#d4af37');
                        textGrad.addColorStop(1, '#aa7c1e');
                        
                        ctx.font = 'bold 16px "Times New Roman", "Georgia", serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        // Drop shadow for depth
                        ctx.shadowColor = '#000000';
                        ctx.shadowBlur = 4;
                        ctx.shadowOffsetX = 1;
                        ctx.shadowOffsetY = 1;
                        ctx.fillStyle = textGrad;
                        ctx.fillText('P&T', s/2, s/2);
                        // Reset shadow
                        ctx.shadowColor = 'transparent';
                        ctx.shadowBlur = 0;
                        ctx.shadowOffsetX = 0;
                        ctx.shadowOffsetY = 0;

                        // Second lighter pass for golden glow outline
                        ctx.fillStyle = 'rgba(255,245,200,0.4)';
                        ctx.fillText('P&T', s/2 - 0.3, s/2 - 0.3);
                        // then gold again for crispness
                        ctx.fillStyle = textGrad;
                        ctx.fillText('P&T', s/2, s/2);

                        // Shimmer highlight (moving white/gold sweep)
                        ctx.save();
                        ctx.beginPath();
                        ctx.rect(shineX - 4, 6, 10, s-12);
                        ctx.clip();
                        const shimmerGrad = ctx.createLinearGradient(shineX-4, 0, shineX+10, 0);
                        shimmerGrad.addColorStop(0, 'rgba(255,255,255,0)');
                        shimmerGrad.addColorStop(0.4, 'rgba(255,255,255,0.7)');
                        shimmerGrad.addColorStop(0.6, 'rgba(255,255,255,0.7)');
                        shimmerGrad.addColorStop(1, 'rgba(255,255,255,0)');
                        ctx.fillStyle = shimmerGrad;
                        ctx.fillText('P&T', s/2, s/2);
                        ctx.restore();

                        // Sparkle 1 (diamond shape near top left of text)
                        const sp1x = s/2 - 10 + Math.cos(sparkAngle1)*5;
                        const sp1y = s/2 - 8 + Math.sin(sparkAngle1)*3;
                        const sp1Alpha = 0.5 + 0.5 * Math.abs(Math.sin(sparkAngle1*2));
                        ctx.fillStyle = `rgba(255,245,200,${sp1Alpha})`;
                        ctx.beginPath();
                        ctx.moveTo(sp1x, sp1y-3);
                        ctx.lineTo(sp1x+1.5, sp1y);
                        ctx.lineTo(sp1x, sp1y+3);
                        ctx.lineTo(sp1x-1.5, sp1y);
                        ctx.closePath();
                        ctx.fill();
                        // tiny center
                        ctx.fillStyle = `rgba(255,255,255,${sp1Alpha*1.2})`;
                        ctx.beginPath();
                        ctx.arc(sp1x, sp1y, 0.8, 0, Math.PI*2);
                        ctx.fill();

                        // Sparkle 2 (near bottom right)
                        const sp2x = s/2 + 11 + Math.cos(sparkAngle2)*4;
                        const sp2y = s/2 + 7 + Math.sin(sparkAngle2)*2.5;
                        const sp2Alpha = 0.4 + 0.6 * Math.abs(Math.cos(sparkAngle2*2));
                        ctx.fillStyle = `rgba(255,245,200,${sp2Alpha})`;
                        ctx.beginPath();
                        ctx.moveTo(sp2x, sp2y-2.5);
                        ctx.lineTo(sp2x+1.2, sp2y);
                        ctx.lineTo(sp2x, sp2y+2.5);
                        ctx.lineTo(sp2x-1.2, sp2y);
                        ctx.closePath();
                        ctx.fill();
                        ctx.fillStyle = `rgba(255,255,255,${sp2Alpha})`;
                        ctx.beginPath();
                        ctx.arc(sp2x, sp2y, 0.7, 0, Math.PI*2);
                        ctx.fill();

                        // Small floating gold particles around
                        for (let p = 0; p < 3; p++) {
                            const angle = (t * Math.PI*2) + (p * 2.1);
                            const rad = s*0.32 + p*2;
                            const dx = s/2 + Math.cos(angle)*rad;
                            const dy = s/2 + Math.sin(angle)*rad;
                            const alpha = 0.3 + 0.4 * Math.abs(Math.sin(angle*3));
                            ctx.fillStyle = `rgba(255,215,0,${alpha})`;
                            ctx.beginPath();
                            ctx.arc(dx, dy, 0.5, 0, Math.PI*2);
                            ctx.fill();
                        }

                    }, FAV));
                }
                return framesArr;
            }

            function renderFrame(drawFn, size = FAV) {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, size, size);
                drawFn(ctx, size);
                return canvas.toDataURL('image/png');
            }

            // ──────────────────────────────────────
            // UI CONTROL & ANIMATION LOOP
            // ──────────────────────────────────────
            const previewCanvas = document.getElementById('favicon-preview');
            const previewCtx = previewCanvas.getContext('2d');
            const speedSlider = document.getElementById('speed-slider');
            const speedDisplay = document.getElementById('speed-display');
            const statusText = document.getElementById('status-text');

            function updatePreview() {
                if (frames.length === 0) return;
                const img = new Image();
                img.src = frames[frameIdx];
                img.onload = () => {
                    previewCtx.clearRect(0, 0, 32, 32);
                    previewCtx.drawImage(img, 0, 0);
                };
            }

            function updateFavicon() {
                if (frames.length === 0) return;
                faviconLink.href = frames[frameIdx];
                updatePreview();
                frameIdx = (frameIdx + 1) % frames.length;
                if (frameIdx % 6 === 0) {
                    statusText.textContent = `P&amp;T favicon running — frame ${frameIdx+1}/${frames.length} ✦`;
                }
            }

            function restartLoop() {
                if (intervalId) clearInterval(intervalId);
                if (frames.length === 0) return;
                frameIdx = 0;
                updateFavicon();
                intervalId = setInterval(updateFavicon, speed);
                statusText.textContent = `P&amp;T luxury text favicon active ✦`;
            }

            speedSlider.addEventListener('input', () => {
                speed = parseInt(speedSlider.value);
                speedDisplay.textContent = speed + 'ms';
                restartLoop();
            });

            // Keep animation running even when tab is hidden
            document.addEventListener('visibilitychange', () => { /* no pause */ });

            // Polyfill roundRect (optional, not used but kept for safety)
            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                    if (typeof r === 'number') r = {tl: r, tr: r, br: r, bl: r};
                    this.beginPath();
                    this.moveTo(x + r.tl, y);
                    this.lineTo(x + w - r.tr, y);
                    this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                    this.lineTo(x + w, y + h - r.br);
                    this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                    this.lineTo(x + r.bl, y + h);
                    this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                    this.lineTo(x, y + r.tl);
                    this.quadraticCurveTo(x, y, x + r.tl, y);
                    this.closePath();
                };
            }

            function init() {
                speedSlider.value = speed;
                speedDisplay.textContent = speed + 'ms';
                frames = generateUltraPTFrames(48);
                restartLoop();
            }
            init();
            console.log('✦ P&T Ultra Luxury Favicon active — pure text, continuous animation.');
        })();
    </script>
</body>
</html>
