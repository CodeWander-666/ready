<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&T — Luxury Animated Text Favicon</title>
    <link id="dynamic-favicon" rel="icon" type="image/png" href="">
    <style>
        :root {
            --bg: #030914;
            --card-bg: #0b1320;
            --text: #e1e8f5;
            --gold: #d4af37;
            --gold-light: #fceabb;
            --border: #1e3a5e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(212,175,55,0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 30% 70%, rgba(212,175,55,0.03) 0%, transparent 60%);
        }
        .container {
            max-width: 720px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 28px;
            align-items: center;
        }

        /* SVG Showcase */
        .svg-showcase {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
        }
        .svg-showcase svg {
            width: 340px;
            height: 180px;
            max-width: 100%;
            filter: drop-shadow(0 10px 24px rgba(0,0,0,0.5));
        }
        .svg-showcase h2 {
            font-size: 1.1rem;
            font-weight: 500;
            margin-top: 12px;
            letter-spacing: 1px;
            color: var(--gold);
            text-transform: uppercase;
        }
        .svg-showcase p {
            font-size: 0.78rem;
            color: #8a9bb5;
            margin-top: 4px;
        }

        /* Favicon Card */
        .favicon-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        .favicon-preview {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .favicon-preview canvas {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(212,175,55,0.3);
            image-rendering: auto;
        }
        .favicon-preview span {
            font-weight: 600;
            font-size: 0.9rem;
            color: #b0c4de;
        }
        .speed-control {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .speed-control input[type="range"] {
            width: 180px;
            accent-color: var(--gold);
        }
        .speed-value {
            font-weight: 700;
            color: var(--gold);
            width: 50px;
            text-align: center;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 18px;
            background: #060e1c;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #8899b4;
        }
        .status .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff, var(--gold));
            box-shadow: 0 0 12px var(--gold);
            animation: pulseGold 1.3s infinite;
        }
        @keyframes pulseGold {
            0%,100%{ box-shadow:0 0 6px var(--gold); }
            50%{ box-shadow:0 0 18px var(--gold),0 0 28px var(--gold); }
        }

        /* SVG internal animations */
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
        @keyframes textGlowPulse {
            0%,100% { filter: drop-shadow(0 0 8px #d4af37) drop-shadow(0 0 2px #d4af37); }
            50% { filter: drop-shadow(0 0 18px #fceabb) drop-shadow(0 0 6px #d4af37); }
        }
        @keyframes underlineExtend {
            0% { stroke-dashoffset: 60; opacity:0.7; }
            100% { stroke-dashoffset: 0; opacity:1; }
        }
        @keyframes diamondSpin {
            0% { transform: rotate(0deg); opacity:0.8; }
            50% { transform: rotate(180deg) scale(1.2); opacity:1; }
            100% { transform: rotate(360deg); opacity:0.8; }
        }
        @keyframes gentleFloat {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }
        .text-group {
            animation: gentleFloat 4s ease-in-out infinite;
        }
        .glow-layer {
            animation: textGlowPulse 3s ease-in-out infinite;
        }
        .underline-path {
            stroke-dasharray: 60;
            animation: underlineExtend 2s ease-out forwards, underlineExtend 2s ease-out infinite alternate;
        }
        .diamond-sparkle {
            transform-origin: 185px 115px;
            animation: diamondSpin 3s linear infinite;
        }
        .shimmer-rect {
            animation: shimmer 2.5s linear infinite;
        }

        .footer-text {
            font-size: 0.7rem;
            color: #4a5d75;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- LUXURY ANIMATED SVG (P&T text only) -->
        <div class="svg-showcase">
            <svg viewBox="0 0 350 180" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#d4af37" />
                        <stop offset="30%" stop-color="#fceabb" />
                        <stop offset="50%" stop-color="#d4af37" />
                        <stop offset="80%" stop-color="#f9e282" />
                        <stop offset="100%" stop-color="#aa7c1e" />
                    </linearGradient>
                    <linearGradient id="shimmerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="rgba(255,255,255,0)" />
                        <stop offset="40%" stop-color="rgba(255,255,255,0.6)" />
                        <stop offset="60%" stop-color="rgba(255,255,255,0.6)" />
                        <stop offset="100%" stop-color="rgba(255,255,255,0)" />
                    </linearGradient>
                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="5" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur" />
                            <feMergeNode in="blur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>

                <!-- Elegent background lines -->
                <line x1="60" y1="90" x2="290" y2="90" stroke="rgba(255,255,255,0.05)" stroke-width="0.8" />
                <line x1="80" y1="94" x2="270" y2="94" stroke="rgba(212,175,55,0.12)" stroke-width="0.6" />

                <!-- Main text group with floating animation -->
                <g class="text-group glow-layer">
                    <text x="175" y="80" text-anchor="middle" font-size="52" font-weight="900" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" letter-spacing="6" fill="url(#goldGrad)" filter="url(#glow)">
                        P&amp;T
                    </text>
                </g>

                <!-- Shimmer overlay over text -->
                <rect x="60" y="30" width="230" height="60" fill="url(#shimmerGrad)" class="shimmer-rect" />

                <!-- Decorative underline (extending) -->
                <path d="M90,110 Q175,130 260,110" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linecap="round" class="underline-path" />

                <!-- Tiny diamond sparkle underneath -->
                <g class="diamond-sparkle">
                    <path d="M185,112 L188,118 L185,124 L182,118 Z" fill="#fceabb" opacity="0.9" />
                    <circle cx="185" cy="118" r="2" fill="#ffffff" opacity="0.7" />
                </g>

                <!-- Second sparkle near letter P -->
                <circle cx="110" cy="65" r="1.8" fill="#fceabb" opacity="0.7">
                    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
                </circle>
                <!-- Sparkle near T -->
                <circle cx="240" cy="60" r="1.5" fill="#fceabb" opacity="0.8">
                    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" begin="0.5s" repeatCount="indefinite" />
                </circle>

                <!-- Small journey text subtitle -->
                <text x="175" y="140" text-anchor="middle" font-size="12" font-weight="300" letter-spacing="3" fill="#b0c4de" opacity="0.8">
                    LUXURY JOURNEY
                </text>
            </svg>
            <h2>P&amp;T — Animated Luxury</h2>
            <p>Pure text animation without globe or airplane</p>
        </div>

        <!-- FAVICON CONTROL (canvas frames) -->
        <div class="favicon-card">
            <div class="favicon-preview">
                <canvas id="favicon-preview-canvas" width="32" height="32"></canvas>
                <span>Live Favicon ✨</span>
            </div>
            <div class="speed-control">
                <span style="font-size:0.8rem;">Slow</span>
                <input type="range" id="speed-slider" min="80" max="240" value="120" step="10">
                <span style="font-size:0.8rem;">Fast</span>
                <span class="speed-value" id="speed-display">120ms</span>
            </div>
            <div class="status">
                <span class="dot"></span>
                <span id="status-text">P&amp;T favicon animating continuously ✨</span>
            </div>
        </div>
        <div class="footer-text">✨ P&amp;T Luxury Brand — Pure text animation, favicon rendered frame‑by‑frame for all browsers</div>
    </div>

    <script>
        (function() {
            const faviconLink = document.getElementById('dynamic-favicon');
            const FAV = 32;

            let frames = [];
            let frameIdx = 0;
            let intervalId = null;
            let speed = 120; // ms

            // ────────────────────────────────
            // CANVAS FRAME GENERATOR (Pure P&T text animation)
            // ────────────────────────────────
            function generatePTTextFrames(count = 36) {
                const out = [];
                for (let i = 0; i < count; i++) {
                    const t = i / count;
                    // shimmer sweep position
                    const shineX = (t * 60) - 20; // moves across text

                    out.push(renderFrame((ctx, s) => {
                        // Deep luxury background
                        const bgGrad = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s*0.7);
                        bgGrad.addColorStop(0, '#0b2d4f');
                        bgGrad.addColorStop(1, '#010510');
                        ctx.fillStyle = bgGrad;
                        ctx.fillRect(0, 0, s, s);

                        // Subtle golden border
                        ctx.strokeStyle = 'rgba(212,175,55,0.3)';
                        ctx.lineWidth = 0.6;
                        ctx.roundRect(1, 1, s-2, s-2, 3);
                        ctx.stroke();

                        // Text gradient (gold)
                        const textGrad = ctx.createLinearGradient(s*0.2, s*0.3, s*0.8, s*0.7);
                        textGrad.addColorStop(0, '#d4af37');
                        textGrad.addColorStop(0.5, '#fceabb');
                        textGrad.addColorStop(1, '#d4af37');
                        ctx.fillStyle = textGrad;
                        ctx.font = 'bold 18px "Inter", "Segoe UI", system-ui, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        // Draw text with drop shadow for luxury feel
                        ctx.shadowColor = '#d4af37';
                        ctx.shadowBlur = 5;
                        ctx.fillText('P&T', s/2, s/2);
                        // Reset shadow
                        ctx.shadowColor = 'transparent';
                        ctx.shadowBlur = 0;

                        // Shining highlight (white sweep)
                        ctx.save();
                        ctx.beginPath();
                        ctx.rect(shineX - 5, 4, 8, s-8);
                        ctx.clip();
                        ctx.fillStyle = 'rgba(255,255,255,0.45)';
                        ctx.fillText('P&T', s/2, s/2);
                        ctx.restore();

                        // Tiny diamond sparkle near the text (static position but fades)
                        const sparkAlpha = 0.3 + 0.5 * Math.abs(Math.sin(t * Math.PI * 4));
                        ctx.fillStyle = `rgba(252,234,187,${sparkAlpha})`;
                        ctx.beginPath();
                        ctx.moveTo(s/2, s/2 - 10);
                        ctx.lineTo(s/2 + 1.5, s/2 - 12);
                        ctx.lineTo(s/2, s/2 - 14);
                        ctx.lineTo(s/2 - 1.5, s/2 - 12);
                        ctx.closePath();
                        ctx.fill();

                        // Additional tiny sparkle near bottom
                        const spark2Alpha = 0.2 + 0.4 * Math.abs(Math.cos(t * Math.PI * 6));
                        ctx.fillStyle = `rgba(255,255,255,${spark2Alpha})`;
                        ctx.beginPath();
                        ctx.arc(s/2 + 8, s/2 + 5, 0.8, 0, Math.PI*2);
                        ctx.fill();
                    }, FAV));
                }
                return out;
            }

            function renderFrame(drawFn, size = FAV) {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, size, size);
                drawFn(ctx, size);
                return canvas.toDataURL('image/png');
            }

            // ────────────────────────────────
            // UI & FAVICON CONTROL
            // ────────────────────────────────
            const speedSlider = document.getElementById('speed-slider');
            const speedDisplay = document.getElementById('speed-display');
            const statusText = document.getElementById('status-text');
            const previewCanvas = document.getElementById('favicon-preview-canvas');
            const previewCtx = previewCanvas.getContext('2d');

            function updatePreview() {
                if (frames.length === 0) return;
                const img = new Image();
                img.src = frames[frameIdx];
                img.onload = () => {
                    previewCtx.clearRect(0, 0, 32, 32);
                    previewCtx.drawImage(img, 0, 0);
                };
            }

            function updateFavicon() {
                if (frames.length === 0) return;
                faviconLink.href = frames[frameIdx];
                updatePreview();
                frameIdx = (frameIdx + 1) % frames.length;
                if (frameIdx % 5 === 0) {
                    statusText.textContent = `P&amp;T favicon running — frame ${frameIdx+1}/${frames.length} ✨`;
                }
            }

            function restartLoop() {
                if (intervalId) clearInterval(intervalId);
                if (frames.length === 0) return;
                frameIdx = 0;
                updateFavicon();
                intervalId = setInterval(updateFavicon, speed);
                statusText.textContent = `P&amp;T luxury text favicon active ✨`;
            }

            speedSlider.addEventListener('input', () => {
                speed = parseInt(speedSlider.value);
                speedDisplay.textContent = speed + 'ms';
                restartLoop();
            });

            // No visibility pause — favicon loops continuously
            document.addEventListener('visibilitychange', () => {});

            // roundRect polyfill
            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                    if (typeof r === 'number') r = {tl: r, tr: r, br: r, bl: r};
                    this.beginPath();
                    this.moveTo(x + r.tl, y);
                    this.lineTo(x + w - r.tr, y);
                    this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                    this.lineTo(x + w, y + h - r.br);
                    this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                    this.lineTo(x + r.bl, y + h);
                    this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                    this.lineTo(x, y + r.tl);
                    this.quadraticCurveTo(x, y, x + r.tl, y);
                    this.closePath();
                };
            }

            function init() {
                speedSlider.value = speed;
                speedDisplay.textContent = speed + 'ms';
                frames = generatePTTextFrames(36);
                restartLoop();
            }

            init();
            console.log('✨ P&T Luxury Text Favicon active — no globe, no airplane, pure brand.');
        })();
    </script>
</body>
</html>
