<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&T — Rotating Shine Luxury Favicon</title>
    <link id="dynamic-favicon" rel="icon" type="image/png" href="">
    <style>
        :root {
            --bg: #020510;
            --card-bg: #0b0f1c;
            --text: #e9ecf2;
            --gold: #d4af37;
            --gold-light: #fef0c8;
            --border: #2a3050;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background-image:
                radial-gradient(ellipse at 50% 30%, rgba(212,175,55,0.08) 0%, transparent 65%),
                radial-gradient(ellipse at 20% 80%, rgba(212,175,55,0.04) 0%, transparent 65%);
        }
        .container {
            max-width: 550px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 26px;
            align-items: center;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 32px 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,215,0,0.08) inset;
        }
        .preview-box {
            width: 96px;
            height: 96px;
            border-radius: 16px;
            background: #020408;
            box-shadow: 0 0 30px rgba(212,175,55,0.5), 0 0 0 1px rgba(212,175,55,0.3);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas#favicon-preview {
            width: 64px;
            height: 64px;
            image-rendering: auto;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #d4af37, #fef0c8, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 0.8rem;
            color: #a1977a;
            letter-spacing: 1px;
        }
        .control-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 180px;
            height: 6px;
            background: linear-gradient(to right, #d4af37, #fef0c8);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #d4af37;
            border: 2px solid #d4af37;
        }
        .speed-val {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: #d4af37;
            width: 55px;
            text-align: center;
        }
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 8px 16px;
            background: #060a18;
            border-radius: 30px;
            font-size: 0.72rem;
            color: #a1977a;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff, #d4af37);
            box-shadow: 0 0 10px #d4af37;
            animation: pulseDot 1.4s infinite;
        }
        @keyframes pulseDot {
            0%,100%{ box-shadow:0 0 4px #d4af37; }
            50%{ box-shadow:0 0 14px #d4af37, 0 0 24px #d4af37; }
        }
        .footer-note {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            color: #5a6070;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="preview-box">
                <canvas id="favicon-preview" width="64" height="64"></canvas>
            </div>
            <h1>P&amp;T</h1>
            <div class="subtitle">ROTATING SHINE · LUXURY FAVICON</div>
            <div class="control-row">
                <span style="font-size:0.8rem; color:#a1977a;">Slower</span>
                <input type="range" id="speed-slider" min="60" max="200" value="120" step="10">
                <span style="font-size:0.8rem; color:#a1977a;">Faster</span>
                <span class="speed-val" id="speed-display">120ms</span>
            </div>
            <div class="status-bar">
                <span class="status-dot"></span>
                <span id="status-text">P&amp;T rotating &amp; shining ✦</span>
            </div>
        </div>
        <div class="footer-note">
            ✦ Pure text — rotation with shimmering sweep — high‑end brand presence
        </div>
    </div>

    <script>
        (function() {
            const faviconLink = document.getElementById('dynamic-favicon');
            const FAV = 32;
            let frames = [];
            let frameIdx = 0;
            let intervalId = null;
            let speed = 120; // ms per frame

            // ──────────────────────────────────────
            // ULTRA LUXURY ROTATING P&T WITH SHINE
            // ──────────────────────────────────────
            function generateRotatingShineFrames(count = 48) {
                const framesArr = [];
                for (let i = 0; i < count; i++) {
                    const t = i / count;
                    // Rotation angle – full 360° over one cycle
                    const rotationAngle = t * Math.PI * 2;
                    // Shine sweep position (moves across the text horizontally in local space)
                    const shineOffset = (t * 40) - 8; // will be used after rotation

                    framesArr.push(renderFrame((ctx, s) => {
                        // Deep dark background
                        const bgGrad = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s*0.7);
                        bgGrad.addColorStop(0, '#0d1f33');
                        bgGrad.addColorStop(1, '#020408');
                        ctx.fillStyle = bgGrad;
                        ctx.fillRect(0, 0, s, s);

                        // Golden ornate border (double ring)
                        ctx.strokeStyle = 'rgba(212,175,55,0.4)';
                        ctx.lineWidth = 1.4;
                        ctx.beginPath();
                        ctx.arc(s/2, s/2, s*0.48, 0, Math.PI*2);
                        ctx.stroke();
                        ctx.strokeStyle = 'rgba(255,240,190,0.2)';
                        ctx.lineWidth = 0.6;
                        ctx.beginPath();
                        ctx.arc(s/2, s/2, s*0.43, 0, Math.PI*2);
                        ctx.stroke();

                        // Pulsing golden glow behind text
                        const glowPulse = 0.6 + 0.4 * Math.sin(t * Math.PI * 3);
                        const glowGrad = ctx.createRadialGradient(s/2, s/2, s*0.05, s/2, s/2, s*0.32);
                        glowGrad.addColorStop(0, `rgba(212,175,55,${glowPulse*0.9})`);
                        glowGrad.addColorStop(1, 'rgba(212,175,55,0)');
                        ctx.fillStyle = glowGrad;
                        ctx.beginPath();
                        ctx.arc(s/2, s/2, s*0.32, 0, Math.PI*2);
                        ctx.fill();

                        // Save context, translate to center, rotate
                        ctx.save();
                        ctx.translate(s/2, s/2);
                        ctx.rotate(rotationAngle);

                        // Base gold gradient for text
                        const textGrad = ctx.createLinearGradient(-10, -8, 12, 8);
                        textGrad.addColorStop(0, '#d4af37');
                        textGrad.addColorStop(0.4, '#fef0c8');
                        textGrad.addColorStop(0.7, '#d4af37');
                        textGrad.addColorStop(1, '#aa7c1e');

                        ctx.font = 'bold 15px "Times New Roman", "Georgia", serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        // Deep shadow for luxury feel
                        ctx.shadowColor = '#000';
                        ctx.shadowBlur = 4;
                        ctx.shadowOffsetX = 1;
                        ctx.shadowOffsetY = 1;
                        ctx.fillStyle = textGrad;
                        ctx.fillText('P&T', 0, 0);
                        // Reset shadow for crispness
                        ctx.shadowColor = 'transparent';
                        ctx.shadowBlur = 0;
                        ctx.shadowOffsetX = 0;
                        ctx.shadowOffsetY = 0;

                        // Additional light glow pass
                        ctx.fillStyle = 'rgba(255,245,200,0.35)';
                        ctx.fillText('P&T', -0.2, -0.2);
                        // Then re‑draw main gold for clarity
                        ctx.fillStyle = textGrad;
                        ctx.fillText('P&T', 0, 0);

                        // Shining sweep (moving highlight) – applied on top
                        // We'll create a clipping region from the sweep rectangle
                        ctx.save();
                        ctx.beginPath();
                        // Rectangle in local coordinates that moves horizontally
                        ctx.rect(shineOffset - 5, -12, 12, 24);
                        ctx.clip();
                        // Shimmer gradient (white to transparent)
                        const shineGrad = ctx.createLinearGradient(shineOffset-5, 0, shineOffset+12, 0);
                        shineGrad.addColorStop(0, 'rgba(255,255,255,0)');
                        shineGrad.addColorStop(0.4, 'rgba(255,255,255,0.8)');
                        shineGrad.addColorStop(0.6, 'rgba(255,255,255,0.8)');
                        shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
                        ctx.fillStyle = shineGrad;
                        // Draw text again inside clip
                        ctx.font = 'bold 15px "Times New Roman", "Georgia", serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('P&T', 0, 0);
                        ctx.restore();

                        // Tiny diamond sparkle near the top of the text (in rotated space)
                        // We place it at a fixed local position (top center) so it rotates with text
                        const sparkAlpha = 0.5 + 0.5 * Math.abs(Math.sin(t * Math.PI * 5));
                        ctx.fillStyle = `rgba(255,255,255,${sparkAlpha})`;
                        ctx.beginPath();
                        // Diamond shape at y=-10 (top of text)
                        ctx.moveTo(0, -11);
                        ctx.lineTo(2, -13);
                        ctx.lineTo(0, -15);
                        ctx.lineTo(-2, -13);
                        ctx.closePath();
                        ctx.fill();
                        // tiny center spark
                        ctx.fillStyle = `rgba(255,240,200,${sparkAlpha*1.2})`;
                        ctx.beginPath();
                        ctx.arc(0, -13, 1, 0, Math.PI*2);
                        ctx.fill();

                        ctx.restore(); // back to un-rotated canvas

                        // Floating gold particles around the border (global space)
                        for (let p = 0; p < 3; p++) {
                            const angle = (t * Math.PI*2) + (p * 2.1);
                            const rad = s*0.33 + p*1.5;
                            const px = s/2 + Math.cos(angle)*rad;
                            const py = s/2 + Math.sin(angle)*rad;
                            const alpha = 0.3 + 0.3 * Math.abs(Math.sin(angle*3));
                            ctx.fillStyle = `rgba(255,215,0,${alpha})`;
                            ctx.beginPath();
                            ctx.arc(px, py, 0.5, 0, Math.PI*2);
                            ctx.fill();
                        }

                    }, FAV));
                }
                return framesArr;
            }

            function renderFrame(drawFn, size = FAV) {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, size, size);
                drawFn(ctx, size);
                return canvas.toDataURL('image/png');
            }

            // ──────────────────────────────────────
            // UI & FAVICON CONTROL
            // ──────────────────────────────────────
            const previewCanvas = document.getElementById('favicon-preview');
            const previewCtx = previewCanvas.getContext('2d');
            const speedSlider = document.getElementById('speed-slider');
            const speedDisplay = document.getElementById('speed-display');
            const statusText = document.getElementById('status-text');

            function updatePreview() {
                if (frames.length === 0) return;
                const img = new Image();
                img.src = frames[frameIdx];
                img.onload = () => {
                    previewCtx.clearRect(0, 0, 64, 64);
                    previewCtx.drawImage(img, 0, 0, 64, 64);
                };
            }

            function updateFavicon() {
                if (frames.length === 0) return;
                faviconLink.href = frames[frameIdx];
                updatePreview();
                frameIdx = (frameIdx + 1) % frames.length;
                if (frameIdx % 6 === 0) {
                    statusText.textContent = `P&amp;T rotating & shining — frame ${frameIdx+1}/${frames.length} ✦`;
                }
            }

            function restartLoop() {
                if (intervalId) clearInterval(intervalId);
                if (frames.length === 0) return;
                frameIdx = 0;
                updateFavicon();
                intervalId = setInterval(updateFavicon, speed);
                statusText.textContent = `P&amp;T luxury rotation active ✦`;
            }

            speedSlider.addEventListener('input', () => {
                speed = parseInt(speedSlider.value);
                speedDisplay.textContent = speed + 'ms';
                restartLoop();
            });

            // No pause when tab hidden – keeps rotating
            document.addEventListener('visibilitychange', () => {});

            // Polyfill (unused but safe)
            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                    if (typeof r === 'number') r = {tl: r, tr: r, br: r, bl: r};
                    this.beginPath();
                    this.moveTo(x + r.tl, y);
                    this.lineTo(x + w - r.tr, y);
                    this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                    this.lineTo(x + w, y + h - r.br);
                    this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                    this.lineTo(x + r.bl, y + h);
                    this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                    this.lineTo(x, y + r.tl);
                    this.quadraticCurveTo(x, y, x + r.tl, y);
                    this.closePath();
                };
            }

            function init() {
                speedSlider.value = speed;
                speedDisplay.textContent = speed + 'ms';
                frames = generateRotatingShineFrames(48);
                restartLoop();
            }
            init();
            console.log('✦ P&T Rotating Shine Favicon – luxury text animation alive.');
        })();
    </script>
</body>
</html>
