<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P&T Luxury Travel — Animated Journey Logo & Favicon</title>
    <link id="dynamic-favicon" rel="icon" type="image/png" href="">
    <style>
        :root {
            --bg: #030914;
            --card-bg: #0b1320;
            --text: #e1e8f5;
            --gold: #d4af37;
            --gold2: #c9a84c;
            --accent: #00a8e8;
            --border: #1e3a5e;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background-image:
                radial-gradient(ellipse at 40% 30%, rgba(0,168,232,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 65% 60%, rgba(212,175,55,0.06) 0%, transparent 60%);
        }
        .container {
            max-width: 750px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 28px;
            align-items: center;
        }

        /* SVG Logo Card */
        .svg-showcase {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
        }
        .svg-showcase svg {
            width: 320px;
            height: 200px;
            max-width: 100%;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.6));
        }
        .svg-showcase h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: 16px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #d4af37, #f5e6a3);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .svg-showcase p {
            font-size: 0.8rem;
            color: #8a9bb5;
            margin-top: 4px;
        }

        /* Favicon Card */
        .favicon-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        .favicon-preview {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .favicon-preview canvas {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,168,232,0.4);
            image-rendering: auto;
        }
        .favicon-preview span {
            font-weight: 600;
            font-size: 0.9rem;
            color: #b0c4de;
        }
        .speed-control {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .speed-control input[type="range"] {
            width: 180px;
            accent-color: var(--accent);
        }
        .speed-value {
            font-weight: 700;
            color: var(--accent);
            width: 50px;
            text-align: center;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 18px;
            background: #060e1c;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #8899b4;
        }
        .status .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff, #d4af37);
            box-shadow: 0 0 12px #d4af37;
            animation: pulseGold 1.3s infinite;
        }
        @keyframes pulseGold {
            0%,100%{ box-shadow:0 0 6px #d4af37; } 50%{ box-shadow:0 0 18px #d4af37,0 0 28px #d4af37; }
        }

        /* SVG internal animations */
        @keyframes planeOrbit {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes textGlow {
            0%,100% { opacity:0.7; }
            50% { opacity:1; }
        }
        @keyframes sparkle {
            0%,100% { opacity:0; transform:scale(0.8); }
            50% { opacity:1; transform:scale(1.2); }
        }
        @keyframes dash {
            to { stroke-dashoffset: -24; }
        }
        .plane-group {
            transform-origin: 160px 100px;
            animation: planeOrbit 6s linear infinite;
        }
        .text-glow {
            animation: textGlow 2s ease-in-out infinite;
        }
        .sparkle-1 { animation: sparkle 1.5s ease-in-out infinite; }
        .sparkle-2 { animation: sparkle 1.8s ease-in-out 0.3s infinite; }
        .sparkle-3 { animation: sparkle 2.2s ease-in-out 0.6s infinite; }
        .sparkle-4 { animation: sparkle 1.6s ease-in-out 0.9s infinite; }
        .dash-line {
            stroke-dasharray: 4 8;
            animation: dash 1s linear infinite;
        }

        .footer-text {
            font-size: 0.7rem;
            color: #4a5d75;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- LUXURY ANIMATED SVG (big, on‑page) -->
        <div class="svg-showcase">
            <svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#d4af37" />
                        <stop offset="30%" stop-color="#f9e282" />
                        <stop offset="60%" stop-color="#d4af37" />
                        <stop offset="100%" stop-color="#aa7c1e" />
                    </linearGradient>
                    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#1a5276" />
                        <stop offset="100%" stop-color="#041a2b" />
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3" result="blur" />
                        <feMerge>
                            <feMergeNode in="blur" />
                            <feMergeNode in="SourceGraphic" />
                        </feMerge>
                    </filter>
                </defs>

                <!-- Background subtle arcs -->
                <circle cx="160" cy="100" r="85" stroke="rgba(212,175,55,0.12)" stroke-width="1.2" fill="none" />
                <circle cx="160" cy="100" r="92" stroke="rgba(212,175,55,0.06)" stroke-width="0.8" fill="none" />

                <!-- Dashed route path (animated) -->
                <ellipse cx="160" cy="100" rx="78" ry="28" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" class="dash-line" />

                <!-- Globe (static base) -->
                <circle cx="160" cy="100" r="32" fill="url(#globeGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
                <!-- continents simplified -->
                <path d="M144,88 Q150,78 155,88 M148,94 Q150,90 153,94 M140,100 Q138,105 142,108 M170,78 Q175,72 178,78 M168,110 Q170,115 174,112 M152,112 Q150,116 148,112" stroke="#d4af37" stroke-width="1.8" fill="none" stroke-linecap="round" />
                <!-- globe highlight -->
                <path d="M143,80 a20,20 0 0,1 8,-20" stroke="rgba(255,255,255,0.35)" stroke-width="2" fill="none" stroke-linecap="round" />

                <!-- Particle sparkles around globe -->
                <circle cx="135" cy="65" r="1.2" fill="#d4af37" class="sparkle-1" />
                <circle cx="185" cy="60" r="1" fill="#f5e6a3" class="sparkle-2" />
                <circle cx="140" cy="140" r="1.2" fill="#d4af37" class="sparkle-3" />
                <circle cx="190" cy="135" r="1" fill="#f5e6a3" class="sparkle-4" />

                <!-- P&T Text centered -->
                <text x="160" y="105" text-anchor="middle" font-size="28" font-weight="900" font-family="'Inter', system-ui, sans-serif" letter-spacing="3" fill="url(#goldGrad)" filter="url(#glow)" class="text-glow">
                    P&amp;T
                </text>

                <!-- Orbiting plane group -->
                <g class="plane-group">
                    <!-- Plane positioned at top of orbit (relative) -->
                    <g transform="translate(160, 100) rotate(-90) translate(78, 0) rotate(90)">
                        <!-- Jet shape (small) -->
                        <path d="M-8,0 L-1,-3.5 L6,-3.5 L10,0 L6,3.5 L-1,3.5 Z" fill="#ffffff" stroke="#d4af37" stroke-width="1" />
                        <path d="M-8,0 L-12,-2 L-11,0 L-12,2 Z" fill="#ffffff" stroke="#d4af37" stroke-width="0.8" />
                        <!-- window -->
                        <circle cx="2" cy="-1.2" r="1.2" fill="#00a8e8" />
                        <circle cx="2" cy="1.2" r="1.2" fill="#00a8e8" />
                    </g>
                </g>
            </svg>
            <h2>P&amp;T — Luxury Journey</h2>
            <p>Animated logo with globe &amp; private jet</p>
        </div>

        <!-- FAVICON CONTROL -->
        <div class="favicon-card">
            <div class="favicon-preview">
                <canvas id="favicon-preview-canvas" width="32" height="32"></canvas>
                <span>Live Favicon ✨</span>
            </div>
            <div class="speed-control">
                <span style="font-size:0.8rem;">Slow</span>
                <input type="range" id="speed-slider" min="60" max="200" value="110" step="10">
                <span style="font-size:0.8rem;">Fast</span>
                <span class="speed-value" id="speed-display">110ms</span>
            </div>
            <div class="status">
                <span class="dot"></span>
                <span id="status-text">P&amp;T favicon animating continuously 🛩️</span>
            </div>
        </div>
        <div class="footer-text">🌍 P&amp;T Luxury Travel — Favicon drawn with canvas frames for universal browser support</div>
    </div>

    <script>
        (function() {
            const faviconLink = document.getElementById('dynamic-favicon');
            const FAV = 32;

            let frames = [];
            let frameIdx = 0;
            let intervalId = null;
            let speed = 110; // ms

            // ────────────────────────────────
            // CANVAS FRAME GENERATOR (P&T luxury favicon)
            // ────────────────────────────────
            function generatePTFrames(count = 40) {
                const out = [];
                for (let i = 0; i < count; i++) {
                    const t = i / count;
                    const planeAngle = t * Math.PI * 2; // plane orbits text

                    out.push(renderFrame((ctx, s) => {
                        const cx = s / 2;
                        const cy = s / 2;
                        const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, s * 0.7);
                        bgGrad.addColorStop(0, '#0b2d4f');
                        bgGrad.addColorStop(1, '#020812');
                        ctx.fillStyle = bgGrad;
                        ctx.fillRect(0, 0, s, s);

                        // Tiny golden ring
                        ctx.strokeStyle = 'rgba(212,175,55,0.25)';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.arc(cx, cy, s * 0.41, 0, Math.PI * 2);
                        ctx.stroke();

                        // Dashed orbit path
                        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                        ctx.lineWidth = 0.8;
                        ctx.setLineDash([2, 3]);
                        ctx.beginPath();
                        ctx.ellipse(cx, cy, s * 0.4, s * 0.15, 0, 0, Math.PI * 2);
                        ctx.stroke();
                        ctx.setLineDash([]);

                        // P&T text (bold, gold gradient)
                        const textGrad = ctx.createLinearGradient(cx - 10, cy, cx + 10, cy);
                        textGrad.addColorStop(0, '#d4af37');
                        textGrad.addColorStop(0.5, '#fceabb');
                        textGrad.addColorStop(1, '#d4af37');
                        ctx.fillStyle = textGrad;
                        ctx.font = 'bold 16px "Inter", "Segoe UI", system-ui, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowColor = '#d4af37';
                        ctx.shadowBlur = 6;
                        ctx.fillText('P&T', cx, cy);
                        ctx.shadowColor = 'transparent';
                        ctx.shadowBlur = 0;

                        // Globe hint (tiny circle behind text)
                        ctx.strokeStyle = 'rgba(0,168,232,0.2)';
                        ctx.lineWidth = 1.2;
                        ctx.beginPath();
                        ctx.arc(cx, cy, s * 0.18, 0, Math.PI * 2);
                        ctx.stroke();

                        // Orbiting plane
                        const orbitRX = s * 0.4;
                        const orbitRY = s * 0.15;
                        const planeX = cx + Math.cos(planeAngle) * orbitRX;
                        const planeY = cy + Math.sin(planeAngle) * orbitRY;
                        const tangent = Math.atan2(Math.cos(planeAngle) * orbitRY, -Math.sin(planeAngle) * orbitRX) + Math.PI / 2;

                        ctx.save();
                        ctx.translate(planeX, planeY);
                        ctx.rotate(tangent);

                        // Plane body
                        ctx.fillStyle = '#FFFFFF';
                        ctx.beginPath();
                        ctx.ellipse(0, 0, 5.5, 2, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = '#d4af37';
                        ctx.lineWidth = 0.7;
                        ctx.stroke();

                        // Wings
                        ctx.fillStyle = '#E8E9F0';
                        ctx.beginPath();
                        ctx.moveTo(0.5, -1);
                        ctx.lineTo(4, -4.5);
                        ctx.lineTo(6.5, -4);
                        ctx.lineTo(4, -1);
                        ctx.closePath();
                        ctx.fill();
                        ctx.strokeStyle = '#d4af37';
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(0.5, 1);
                        ctx.lineTo(4, 4.5);
                        ctx.lineTo(6.5, 4);
                        ctx.lineTo(4, 1);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();

                        // Tail fin
                        ctx.fillStyle = '#FFFFFF';
                        ctx.beginPath();
                        ctx.moveTo(-5, 0);
                        ctx.lineTo(-8, -3);
                        ctx.lineTo(-7, 0);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();

                        // Engines
                        ctx.fillStyle = '#4A4A5C';
                        ctx.beginPath();
                        ctx.ellipse(3, -3.5, 1.5, 0.9, 0.1, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = '#d4af37';
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.ellipse(3, 3.5, 1.5, 0.9, -0.1, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();

                        // Windows
                        ctx.fillStyle = '#00a8e8';
                        ctx.beginPath();
                        ctx.arc(1.5, -0.8, 0.9, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(1.5, 0.8, 0.9, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.restore();

                        // Small sparkle near text
                        ctx.fillStyle = '#d4af37';
                        const sparkleX = cx + Math.cos(t * Math.PI * 4) * 10;
                        const sparkleY = cy - 8 + Math.sin(t * Math.PI * 6) * 2;
                        ctx.beginPath();
                        ctx.arc(sparkleX, sparkleY, 0.6, 0, Math.PI * 2);
                        ctx.fill();
                    }, FAV));
                }
                return out;
            }

            function renderFrame(drawFn, size = FAV) {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, size, size);
                drawFn(ctx, size);
                return canvas.toDataURL('image/png');
            }

            // ────────────────────────────────
            // UI & FAVICON CONTROL
            // ────────────────────────────────
            const speedSlider = document.getElementById('speed-slider');
            const speedDisplay = document.getElementById('speed-display');
            const statusText = document.getElementById('status-text');
            const previewCanvas = document.getElementById('favicon-preview-canvas');
            const previewCtx = previewCanvas.getContext('2d');

            function updatePreview() {
                if (frames.length === 0) return;
                const img = new Image();
                img.src = frames[frameIdx];
                img.onload = () => {
                    previewCtx.clearRect(0, 0, 32, 32);
                    previewCtx.drawImage(img, 0, 0);
                };
            }

            function updateFavicon() {
                if (frames.length === 0) return;
                faviconLink.href = frames[frameIdx];
                updatePreview();
                frameIdx = (frameIdx + 1) % frames.length;
                if (frameIdx % 5 === 0) {
                    statusText.textContent = `P&amp;T favicon animating — frame ${frameIdx+1}/${frames.length} 🛩️`;
                }
            }

            function restartLoop() {
                if (intervalId) clearInterval(intervalId);
                if (frames.length === 0) return;
                frameIdx = 0;
                updateFavicon();
                intervalId = setInterval(updateFavicon, speed);
                statusText.textContent = `P&amp;T luxury favicon active ✨`;
            }

            speedSlider.addEventListener('input', () => {
                speed = parseInt(speedSlider.value);
                speedDisplay.textContent = speed + 'ms';
                restartLoop();
            });

            // No visibility pause — keeps spinning
            document.addEventListener('visibilitychange', () => {
                // intentionally empty
            });

            // Init
            function init() {
                speedSlider.value = speed;
                speedDisplay.textContent = speed + 'ms';
                frames = generatePTFrames(40);
                restartLoop();
            }

            init();
            console.log('🏷️ P&T Luxury Animated Favicon running');
        })();
    </script>
</body>
</html>
